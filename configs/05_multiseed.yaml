project: chip-stroma
n_seeds: 3
top_k: 2

callbacks:
  early_stopping:
    metric   : val/loss
    mode     : min
    patience : 25        # Isensee et al. (2021) Nat Methods
    min_delta: 0.001

  epoch_tracker:
    metric : val/dice
    mode: max

  pruner: 
    metric: val/dice
