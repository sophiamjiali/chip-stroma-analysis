study:
  project: chip-stroma  # Main project container
  group  : test         # Sweep name (grouping)

data: 
  fold       : 0    # Which StratifiedGroupKFold fold to train on
  batch_size : 32
  num_workers: 4
  seed       : 42
  pos_prob   : 0.5  # PositiveWeightedSampler positive-patch probability

model:
  encoder_name   : resnet34
  encoder_weights: imagenet
  in_channels    : 3
  out_classes    : 1
 
module:
  lr          : 0.0001
  weight_decay: 0.001
  ftl_alpha   : 0.3   # FTL FP weight (Abraham & Khan, 2019)
  ftl_beta    : 0.7   # FTL FN weight (should be 1 - ftl_alpha)
  ftl_gamma   : 0.75  # FTL focal exponent
  ftl_weight  : 0.5   # composite: ftl_weight*FTL + (1-ftl_weight)*Dice
  smooth      : 1.0
 
trainer:
  max_epochs              : 25
  early_stopping_patience : 10        # Isensee et al. (2021) Nat Methods
  early_stopping_min_delta: 0.00001
  gradient_clip_val       : 1.0

# [END]