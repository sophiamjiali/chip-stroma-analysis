# Normalized and name-sanitized patches and masks
processed_data:
  processed_dir: data
  patch_dir: data/patches
  vessel_mask_dir: data/vessel_masks
  tissue_mask_dir: data/tissue_masks

metadata:
  chip_labels: data/CHIP_IDs.csv
  name_mapping: data/metadata/name_mapping.json
  patch_manifest: data/metadata/patch_manifest.csv
  patch_statistics: data/metadata/patch_statistics.csv
  train_manifest: data/metadata/train_manifest.csv      # include == True

# Key outputs from the full pipeline
outputs:
  masks:
    fibroblasts_dir: outputs/masks/fibroblasts
    vessels_dir: outputs/masks/vessels
  overlays:
    fibroblasts_dir: outputs/overlays/fibroblasts
    vessels_dir: outputs/overlays/vessels
